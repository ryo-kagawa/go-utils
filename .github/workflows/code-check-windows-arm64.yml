name: Code Check windows/arm64

on:
  workflow_call:
    inputs:
      go_version:
        required: true
        type: string
      os_version:
        required: true
        type: string

env:
  GOOS: windows
  GOARCH: arm64
  TARGET: |
    {
      "11": { "runner": "windows-11-arm" }
    }

jobs:
  prepare:
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    runs-on: ubuntu-latest
    steps:
      - id: set
        run: |
          echo "runner=${{ fromJson(env.TARGET)[inputs.os_version].runner }}" >> $GITHUB_OUTPUT

  windows-arm64:
    needs:
      - prepare
    name: windows/arm64(Windows ${{ inputs.os_version }})
    runs-on: ${{ needs.prepare.outputs.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/tmp/go
          key: go${{ inputs.go_version }}.${{ env.GOOS }}-${{ env.GOARCH }}
          fail-on-cache-miss: true
      - run: Add-Content $env:GITHUB_PATH "${{ github.workspace }}/tmp/go/bin"
      - run: go vet ./...
      - run: go test ./...
