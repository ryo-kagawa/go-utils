name: Code Check darwin/arm64

on:
  workflow_call:
    inputs:
      go_version:
        required: true
        type: string
      os_version:
        required: true
        type: string

env:
  GOOS: darwin
  GOARCH: arm64
  TARGET: |
    {
      "14": { "runner": "macos-14" },
      "15": { "runner": "macos-15" },
      "26": { "runner": "macos-26" }
    }

jobs:
  prepare:
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    runs-on: ubuntu-latest
    steps:
      - id: set
        run: |
          echo "runner=${{ fromJson(env.TARGET)[inputs.os_version].runner }}" >> $GITHUB_OUTPUT

  darwin-arm64:
    needs:
      - prepare
    name: darwin/arm64(macOS ${{ inputs.os_version }})
    runs-on: ${{ needs.prepare.outputs.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/tmp/go
          key: go${{ inputs.go_version }}.${{ env.GOOS }}-${{ env.GOARCH }}
          fail-on-cache-miss: true
      - run: echo "${{ github.workspace }}/tmp/go/bin" >> $GITHUB_PATH
      - run: go vet ./...
      - run: go test ./...
