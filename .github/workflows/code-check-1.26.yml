name: Code Check 1.26

on:
  workflow_call:

env:
  GO_VERSION: 1.26.0

jobs:
  darwin-amd64:
    strategy:
      fail-fast: false
      matrix:
        target:
          # - runner: macos-14-large
          #   name: macOS 14
          - runner: macos-15-intel
            name: macOS 15
          # - runner: macos-26-large
          #   name: macOS 26
    name: darwin/amd64(${{ matrix.target.name }})
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...
      - run: go test ./...

  darwin-arm64:
    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: macos-14
            name: macOS 14
          - runner: macos-15
            name: macOS 15
          - runner: macos-26
            name: macOS 26
    name: darwin/arm64(${{ matrix.target.name }})
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...
      - run: go test ./...

  freebsd-amd64:
    strategy:
      fail-fast: false
      matrix:
        version:
          - '12.2'
          - '12.4'
          - '13.0'
          - '13.1'
          - '13.2'
          - '13.3'
          - '13.4'
          - '13.5'
          - '14.0'
          - '14.1'
          - '14.2'
          - '14.3'
          - '15.0'
    name: freebsd/amd64(FreeBSD ${{ matrix.version }})
    runs-on: ubuntu-latest
    env:
      GOOS: freebsd
      GOARCH: amd64
    steps:
      - uses: actions/checkout@v6
      - id: cache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/tmp/go
          key: go${{ env.GO_VERSION }}.${{ env.GOOS }}-${{ env.GOARCH }}
      - if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir tmp
          cd tmp
          curl --location --output go${{ env.GO_VERSION }}.${{ env.GOOS }}-${{ env.GOARCH }}.tar.gz https://go.dev/dl/go${{ env.GO_VERSION }}.${{ env.GOOS }}-${{ env.GOARCH }}.tar.gz
          tar -xzf go${{ env.GO_VERSION }}.${{ env.GOOS }}-${{ env.GOARCH }}.tar.gz
          rm go${{ env.GO_VERSION }}.${{ env.GOOS }}-${{ env.GOARCH }}.tar.gz
      - uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: ${{ matrix.version }}
          architecture: x86-64
          cpu_count: 4
          sync_files: runner-to-vm
          shell: bash
          run: |
            mv ${{ github.workspace }}/tmp/go /tmp/go
            export PATH=$PATH:/tmp/go/bin &&
            cd ${{ github.workspace }} &&
            go vet ./... &&
            go test -p 1 -parallel 1 ./...

  freebsd-arm64:
    strategy:
      fail-fast: false
      matrix:
        version:
          - '12.4'
          - '13.0'
          - '13.1'
          - '13.2'
          - '13.3'
          - '13.4'
          - '13.5'
          - '14.0'
          - '14.1'
          - '14.2'
          - '14.3'
          - '15.0'
    name: freebsd/arm64(FreeBSD ${{ matrix.version }})
    runs-on: ubuntu-latest
    env:
