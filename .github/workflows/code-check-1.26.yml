  linux-386:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04
          - ubuntu-24.04
        target:
          - image: i386/debian:latest
            name: CGO_ENABLED=0
            cgo: 0
          - image: i386/debian:latest
            name: GNU C Library
            cgo: 1
          - image: i386/alpine:latest
            name: GNU C Library
            cgo: 1
    name: linux/386 ${{ matrix.target.name }}(${{ matrix.target.image }})(${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    env:
      GOOS: linux
      GOARCH: 386
      PLATFORM: linux/386
    steps:
      - uses: actions/checkout@v6
      - id: cache
        uses: actions/cache@v5
        with:
          path: /tmp/go
          key: go${{ env.GO_VERSION }}.${{ env.GOOS }}-${{ env.GOARCH }}
      - if: steps.cache.outputs.cache-hit != 'true'
        run: |
          curl --location https://go.dev/dl/go${{ env.GO_VERSION }}.${{ env.GOOS }}-${{ env.GOARCH }}.tar.gz | tar -xzf - -C /tmp
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORM }}
      - run: |
          docker run \
            --rm \
            -v $(pwd):/workspace \
            -v /tmp/go:/tmp/go \
            -w /workspace \
            --platform ${{ env.PLATFORM }} \
            ${{ matrix.target.image }} \
            sh -c "
              export PATH=$PATH:/tmp/go/bin &&
              export CGO_ENABLED=${{ matrix.target.cgo }} &&
              go vet ./... &&
              go test ./... &&
              GO386=softfloat go test ./...
