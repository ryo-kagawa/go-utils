name: Create Cache

on:
  push:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

jobs:
  create-cache-1_22:
    name: Go 1.22
    uses: ./.github/workflows/create-cache-1.22.yml

  create-cache-1_23:
    name: Go 1.23
    uses: ./.github/workflows/create-cache-1.23.yml

  create-cache-1_24:
    name: Go 1.24
    uses: ./.github/workflows/create-cache-1.24.yml

  create-cache-1_25:
    name: Go 1.25
    uses: ./.github/workflows/create-cache-1.25.yml

  create-cache-1_26:
    name: Go 1.26
    uses: ./.github/workflows/create-cache-1.26.yml

  create-cahce-docker-qemu-linux-x64:
    name: Docker QEMU Linux AMD64
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-qemu-action@v4

  create-cahce-docker-qemu-linux-arm64:
    name: Docker QEMU Linux ARM64
    runs-on: 	ubuntu-24.04-arm
    steps:
      - uses: docker/setup-qemu-action@v4
