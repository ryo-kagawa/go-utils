name: Code Check linux/arm v6

on:
  workflow_call:
    inputs:
      go_version:
        required: true
        type: string

env:
  GOOS: linux
  GOARCH: armv6l
  PLATFORM: linux/arm/v6

jobs:
  linux-arm-v6:
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-22.04-arm
          - ubuntu-24.04-arm
        target:
          - image: arm32v6/alpine:latest
            name: CGO_ENABLED=0
            cgo: 0
          - image: arm32v6/alpine:latest
            name: musl
            cgo: 1
    name: linux/arm v6 ${{ matrix.target.name }}(${{ matrix.target.image }})(${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/tmp/go
          key: go${{ inputs.go_version }}.${{ env.GOOS }}-${{ env.GOARCH }}
          fail-on-cache-miss: true
      - uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ env.PLATFORM }}
      - run: |
          docker run \
            --rm \
            -v $(pwd):/workspace \
            -w /workspace \
            --platform ${{ env.PLATFORM }} \
            ${{ matrix.target.image }} \
            sh -c "
              export PATH=$PATH:/workspace/tmp/go/bin &&
              export CGO_ENABLED=${{ matrix.target.cgo }} &&
              export GOARM=6 &&
              go vet ./... &&
              go test ./...
            "
